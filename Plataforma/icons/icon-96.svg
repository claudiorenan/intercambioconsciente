<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="48" cy="48" r="48" fill="url(#bg)"/>
  <!-- Globe ring -->
  <circle cx="48" cy="48" r="36" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none"/>
  <!-- Curved journey path -->
  <path d="M20 48 Q48 20, 76 48" stroke="url(#accent)" stroke-width="2" fill="none" stroke-dasharray="4 4" stroke-linecap="round" opacity="0.7"/>
  <!-- Leaf shape -->
  <path d="M48 20 C36 30, 30 40, 48 66 C66 40, 60 30, 48 20Z" fill="rgba(255,255,255,0.08)"/>
  <!-- Person head -->
  <circle cx="48" cy="36" r="8" fill="white"/>
  <!-- Person shoulders -->
  <path d="M32 62 Q48 50, 64 62" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Decorative dots -->
  <circle cx="26" cy="34" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="70" cy="36" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <!-- IC initials -->
  <text x="48" y="82" text-anchor="middle" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="10" fill="rgba(255,255,255,0.65)" letter-spacing="2">IC</text>
</svg>
